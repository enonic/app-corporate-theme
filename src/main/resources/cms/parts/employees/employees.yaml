    name: "titleEmployee"
    label: "Title"
    occurrences:
      min: 0
      max: 1
    default: "Meet the Team"
    helpText: "Title for second section which is a list of employees."
  - type: "ContentSelector"
    name: "team"
    label: "Employees"
